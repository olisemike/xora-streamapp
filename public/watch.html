<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Watch — RedStreamer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/watch.css">
</head>
<body>
  <div class="noise"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-dot"></span>
        RED<span class="logo-accent">STREAMER</span>
      </a>
      <a href="/" class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
    </div>
  </header>

  <div class="watch-container">
    <div class="watch-layout">

<!-- social bar ads-->
<script src="https://pl28821294.effectivegatecpm.com/c0/bb/32/c0bb32d439563b209e4def12042fe81c.js"></script>
       
      <!-- MAIN CONTENT -->
      <div class="watch-main">

        <!-- AD ABOVE PLAYER -->
<script>
  atOptions = {
    'key' : 'a399b7cca2749f83337c7ee47284ef7a',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/a399b7cca2749f83337c7ee47284ef7a/invoke.js"></script>

        <!-- PLAYER WRAP with pre-roll overlay -->
        <div class="player-wrap">
          <div id="prerollAd" class="preroll-overlay" style="display:none;">
            <div class="preroll-inner">
              <div class="preroll-media" id="prerollMedia"></div>
              <div class="preroll-controls">
                <div class="preroll-progress">
                  <div class="preroll-progress-bar" id="prerollBar"></div>
                </div>
                <div class="preroll-meta">
                  <span class="preroll-label">Ad</span>
                  <span id="prerollCountdown" class="preroll-countdown">Skip in 5s</span>
                  <button id="prerollSkip" class="preroll-skip" disabled>Skip Ad →</button>
                </div>
              </div>
            </div>
          </div>
          <div id="player" class="player">
            <div class="player-placeholder">
              <div class="loading-bars"><span></span><span></span><span></span><span></span></div>
            </div>
          </div>
        </div>

        <!-- AD BELOW PLAYER -->
        <script>
  atOptions = {
    'key' : '6002a3ed72da1523b56a473b2cc2508c',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/6002a3ed72da1523b56a473b2cc2508c/invoke.js"></script>

        <!-- MEDIA INFO -->
        <div class="media-info">
          <div class="media-info-top">
            <h1 id="mediaTitle">Loading...</h1>
            <button id="deleteBtn" class="btn-delete" style="display:none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              Delete
            </button>
          </div>
          <p id="mediaDesc" class="media-desc"></p>
          <div class="media-meta">
            <span class="meta-tag">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <span id="viewCount">0</span> views
            </span>
            <span class="meta-tag meta-category" id="category">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/watch.js"></script>
</body>
</html>
