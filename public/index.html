<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>RedStreamer — Watch & Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="noise"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-dot"></span>
        RED<span class="logo-accent">STREAMER</span>
      </a>
      <div class="header-right">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search videos, images...">
        </div>
        <button id="uploadBtn" class="btn-upload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload
        </button>
      </div>
    </div>
  </header>

<!-- social bar ads-->
 <script src="https://pl28821294.effectivegatecpm.com/c0/bb/32/c0bb32d439563b209e4def12042fe81c.js"></script>

  <!-- TOP BANNER AD -->
<script>
  atOptions = {
    'key' : '6002a3ed72da1523b56a473b2cc2508c',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/6002a3ed72da1523b56a473b2cc2508c/invoke.js"></script>

  <div class="container">
    <!-- CATEGORIES -->
    <div class="categories-wrap">
      <div id="categoryFilter" class="categories"></div>
    </div>

    <div id="loadingIndicator" class="loading">
      <div class="loading-bars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- MEDIA GRID -->
    <div id="mediaGrid" class="grid"></div>

    <!-- PAGINATION -->
    <div class="pagination">
      <button id="prevBtn" class="page-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="page-info">
        <span id="pageNumber">1</span>
        <span class="page-sep">/</span>
        <span id="totalPages">1</span>
      </span>
      <button id="nextBtn" class="page-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- BOTTOM BANNER AD -->
<script>
  atOptions = {
    'key' : '6002a3ed72da1523b56a473b2cc2508c',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/6002a3ed72da1523b56a473b2cc2508c/invoke.js"></script>

  <!-- UPLOAD MODAL -->
  <div id="uploadModal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button id="uploadClose" class="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-header">
        <h2>Upload Media</h2>
        <p>Add videos or images to your stream</p>
      </div>
      <form id="uploadForm" autocomplete="on">
        <div class="form-group">
          <label>Admin Password</label>
          <input type="text" id="adminUsername" name="username" autocomplete="username" style="display:none" value="admin">
          <input type="password" id="adminPassword" name="password" placeholder="Enter admin password" autocomplete="current-password" required>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="uploadTitle" placeholder="Give your media a title" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="uploadDesc" placeholder="What's this about?"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Type</label>
            <select id="uploadType" required>
              <option value="video">Video</option>
              <option value="image">Image</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="uploadCategory" placeholder="e.g. Sports" value="Uncategorized">
          </div>
        </div>
        <div class="form-group">
          <label>File</label>
          <div class="file-drop" id="fileDrop">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="fileDropText">Drop file here or click to browse</span>
            <input type="file" id="uploadFile" required>
          </div>
        </div>
        <button type="submit" class="btn-submit">Upload Media</button>
      </form>
      <div id="uploadStatus" class="status"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
